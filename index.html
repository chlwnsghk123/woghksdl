<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>자이스토리 고2 대수 · 문제 뷰어</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <!-- List view -->
  <section id="list-view">
    <header class="topbar">
      <h1>자이스토리 <small>고2 대수</small></h1>
      <div class="search-row">
        <input id="search" type="search" inputmode="search" autocomplete="off"
               placeholder="코드 검색 (예: A34, c99)" />
        <button id="random-btn" title="랜덤">🎲</button>
      </div>
      <nav class="tabs" id="tabs">
        <button data-tab="all" class="active">전체</button>
        <button data-tab="A">A 지수</button>
        <button data-tab="B">B 로그</button>
        <button data-tab="C">C 지수·로그함수</button>
        <button data-tab="D">D 지·로 활용</button>
        <button data-tab="E">E 삼각함수</button>
        <button data-tab="bookmark">⭐ 북마크</button>
      </nav>
    </header>

    <div class="meta" id="meta"></div>
    <ul id="list" class="grid"></ul>
  </section>

  <!-- Detail view -->
  <section id="detail-view" hidden>
    <header class="topbar detail-top">
      <button id="back-btn" aria-label="뒤로">◀</button>
      <div class="detail-title">
        <strong id="detail-code"></strong>
        <span id="detail-section"></span>
      </div>
      <button id="bookmark-btn" aria-label="북마크">☆</button>
    </header>

    <div class="detail-body">
      <div class="image-wrap">
        <img id="detail-img" alt="" />
      </div>

      <div class="answer-box">
        <button id="reveal-btn" class="reveal">정답 보기</button>
        <div id="answer" class="answer hidden" aria-live="polite"></div>
      </div>

      <div class="nav-row">
        <button id="prev-btn">◀ 이전</button>
        <button id="random-btn-2">🎲 랜덤</button>
        <button id="next-btn">다음 ▶</button>
      </div>
    </div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
