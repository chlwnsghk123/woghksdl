<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<title>자이스토리 고2 대수 · 문제 뷰어</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <!-- List view -->
  <section id="list-view">
    <header class="topbar">
      <h1>자이스토리 <small>고2 대수</small></h1>
      <div class="search-row">
        <div class="search-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <path d="m20 20-3.5-3.5"/>
          </svg>
          <input id="search" type="search" inputmode="search" autocomplete="off"
                 placeholder="코드 검색 (예: A34, c99)" />
        </div>
        <button id="random-btn" class="icon-btn" title="랜덤" aria-label="랜덤">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <circle cx="8" cy="8" r="1.3" fill="currentColor"/>
            <circle cx="16" cy="16" r="1.3" fill="currentColor"/>
            <circle cx="16" cy="8" r="1.3" fill="currentColor"/>
            <circle cx="8" cy="16" r="1.3" fill="currentColor"/>
            <circle cx="12" cy="12" r="1.3" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <nav class="tabs" id="tabs">
        <button data-tab="all" class="active">전체</button>
        <button data-tab="A">A 지수</button>
        <button data-tab="B">B 로그</button>
        <button data-tab="C">C 지수·로그함수</button>
        <button data-tab="D">D 지·로 활용</button>
        <button data-tab="E">E 삼각함수</button>
        <button data-tab="bookmark">⭐ 북마크</button>
      </nav>
    </header>

    <div class="meta" id="meta"></div>
    <ul id="list" class="grid"></ul>
  </section>

  <!-- Detail view -->
  <section id="detail-view" hidden>
    <header class="topbar">
      <button id="back-btn" class="icon-btn" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="detail-title">
        <strong id="detail-code"></strong>
        <span id="detail-section"></span>
      </div>
      <button id="bookmark-btn" class="icon-btn" aria-label="북마크">
        <svg id="bookmark-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17l-6.1 3.5 1.5-6.8L2.2 9l6.9-.7L12 2z"/>
        </svg>
      </button>
    </header>

    <div class="detail-body">
      <div class="image-wrap" id="image-wrap">
        <img id="detail-img" alt="" draggable="false" />
      </div>

      <div class="answer-box">
        <button id="reveal-btn" class="reveal">정답 보기</button>
        <div id="answer" class="answer hidden" aria-live="polite"></div>
      </div>

      <div class="nav-row">
        <button id="prev-btn">◀ 이전</button>
        <button id="random-btn-2">🎲 랜덤</button>
        <button id="next-btn">다음 ▶</button>
      </div>
      <div class="hint">좌우로 스와이프하면 이동해요</div>
    </div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
